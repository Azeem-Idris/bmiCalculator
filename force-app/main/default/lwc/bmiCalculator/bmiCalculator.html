<template>
    <section class="slds-card">
        <div class="slds-card__header slds-grid slds-grid_align-spread slds-p-horizontal_small slds-p-vertical_x-small">
            <header class="slds-media slds-media_center slds-has-flexi-truncate">
                <div class="slds-media__figure">
                    <span class="slds-icon_container slds-icon-standard-skill" title="BMI">
                        <svg class="slds-icon slds-icon_small slds-icon-text-default" aria-hidden="true">
                            <use xlink:href="/assets/icons/standard-sprite/svg/symbols.svg#skill"></use>
                        </svg>
                    </span>
                </div>
                <div class="slds-media__body">
                    <h2 class="slds-card__header-title slds-truncate slds-text-heading_small" title="BMI Calculator">
                        BMI Calculator
                    </h2>
                </div>
            </header>
            <div class="slds-p-left_small">
                <lightning-button-group>
                    <lightning-button label="Metric" variant={metricVariant} onclick={handleMetric}></lightning-button>
                    <lightning-button label="Imperial" variant={imperialVariant} onclick={handleImperial}></lightning-button>
                </lightning-button-group>
            </div>
        </div>

        <div class="slds-card__body slds-p-around_medium">
            <div class="slds-grid slds-wrap slds-gutters">
                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                    <div class="slds-section">
                        <h3 class="slds-text-title_caps slds-m-bottom_small">Inputs</h3>
                        <template if:true={isMetric}>
                            <lightning-input type="number" name="weightKg" label="Weight (kg)" min="0" step="0.1"
                                value={weightKg} onchange={handleWeightKgChange}></lightning-input>
                            <lightning-input type="number" name="heightCm" label="Height (cm)" min="0" step="0.1"
                                value={heightCm} onchange={handleHeightCmChange}></lightning-input>
                        </template>
                        <template if:false={isMetric}>
                            <lightning-input type="number" name="weightLb" label="Weight (lb)" min="0" step="0.1"
                                value={weightLb} onchange={handleWeightLbChange}></lightning-input>
                            <lightning-input type="number" name="heightIn" label="Height (in)" min="0" step="0.1"
                                value={heightIn} onchange={handleHeightInChange}></lightning-input>
                        </template>
                        <template if:true={errorMessage}>
                            <div class="slds-text-color_error slds-m-top_small">{errorMessage}</div>
                        </template>
                    </div>
                </div>

                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                    <div class="slds-section">
                        <h3 class="slds-text-title_caps slds-m-bottom_small">Result</h3>
                        <div class="result slds-p-around_medium slds-border_left slds-border_right slds-border_bottom slds-border_top slds-radius_small"
                             data-testid="result"
                             class={resultClass}
                            <div class="slds-text-heading_medium">
                                <template if:true={hasBmi}>{bmiDisplay}</template>
                                <template if:false={hasBmi}>—</template>
                            </div>
                            <div class="slds-text-body_regular slds-m-top_x-small">{category}</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="slds-m-top_medium">
                <lightning-button variant="brand" label="Clear" onclick={handleClear}></lightning-button>
            </div>
        </div>

        <footer class="slds-card__footer slds-text-title slds-p-horizontal_small slds-p-vertical_x-small">
            BMI = kg / (m^2)  •  Imperial uses BMI = 703 * lb / (in^2)
        </footer>
    </section>
</template>
